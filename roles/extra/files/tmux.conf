# Customize Tmux prefix
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix
# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# New windows on current path
bind c   new-window      -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Overrides tmux color
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Main plugins
set -g @plugin 'tmuxpack/tpack'
set -g @plugin 'tmux-plugins/tmux-sensible'  # R -> source-file, C-n/C-p -> next/previous window

# Themes
set -g @plugin '2kabhishek/tmux2k'
set -g @tmux2k-icons-only true
set -g @tmux2k-left-plugins "session cpu"
set -g @tmux2k-right-plugins "ram time"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
